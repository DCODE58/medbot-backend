services:
  - type: web
    name: medbot-api
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.11.9"

    buildCommand: >
      pip install --upgrade pip setuptools wheel &&
      pip install --only-binary=:all: -r requirements.txt &&
      python -m nltk.downloader -q -d /tmp/nltk_data punkt punkt_tab stopwords wordnet &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py createcachetable &&
      python manage.py populate_kenya_data --force

    startCommand: >
      gunicorn medical_chatbot.wsgi:application
      --worker-class gthread
      --workers 2
      --threads 4
      --timeout 120
      --bind 0.0.0.0:$PORT
      --log-level info

    healthCheckPath: /api/health/

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "medbot-backend-vpf5.onrender.com"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://medbot-frontend-iota.vercel.app"

      - key: NLTK_DATA
        value: "/tmp/nltk_data"

      - key: PYTHON_VERSION
        value: "3.11.9"

      - key: PIP_ONLY_BINARY
        value: ":all:"

databases:
  - name: medbot-db
    databaseName: medbot
    user: medbot_user
    region: oregon
    plan: free
