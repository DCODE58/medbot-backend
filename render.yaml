services:
  - type: web
    name: medbot-backend
    runtime: python
    region: oregon
    plan: free

    # Use sh -c so every command's stdout/stderr goes to the build log
    # and $PORT is shell-expanded at runtime.
    buildCommand: |
      set -e
      echo "==> pip install"
      pip install --upgrade pip setuptools wheel
      pip install --prefer-binary -r requirements.txt
      echo "==> NLTK data"
      python -m nltk.downloader -q -d /tmp/nltk_data punkt punkt_tab stopwords wordnet
      echo "==> collectstatic"
      mkdir -p staticfiles
      python manage.py collectstatic --noinput
      echo "==> migrate"
      python manage.py migrate --noinput
      echo "==> populate_kenya_data"
      python manage.py populate_kenya_data --force
      echo "==> build done"

    startCommand: sh -c 'gunicorn medical_chatbot.wsgi:application --worker-class gthread --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT --log-level info'

    healthCheckPath: /api/health/

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "medbot-backend-vpf5.onrender.com"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://medbot-frontend-iota.vercel.app"

      - key: NLTK_DATA
        value: "/tmp/nltk_data"

      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: medbot-db
    databaseName: medbot
    user: medbot_user
    region: oregon
    plan: free
