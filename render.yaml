services:
  - type: web
    name: medbot-backend
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install --prefer-binary -r requirements.txt
      python -m nltk.downloader -q -d /opt/render/nltk_data punkt punkt_tab stopwords wordnet
      mkdir -p staticfiles
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput

    startCommand: |
      python manage.py createcachetable || true
      python manage.py populate_kenya_data --force || true
      gunicorn medical_chatbot.wsgi:application --worker-class gthread --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT --log-level info

    healthCheckPath: /api/health/

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "medbot-backend-vpf5.onrender.com,localhost,127.0.0.1"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://medbot-frontend-iota.vercel.app"

      - key: NLTK_DATA
        value: "/opt/render/nltk_data"

      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: medbot-db
    databaseName: medbot
    user: medbot_user
    region: oregon
    plan: free
