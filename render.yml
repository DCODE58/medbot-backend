services:
  - type: web
    name: medbot-api
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.11.0"

    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm &&
      python -m nltk.downloader -q -d /tmp/nltk_data punkt punkt_tab stopwords wordnet &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py createcachetable &&
      python manage.py populate_kenya_data --force

    # gthread workers so Overpass API calls don't block the entire worker process
    startCommand: >
      gunicorn medical_chatbot.wsgi:application
      --worker-class gthread
      --workers 2
      --threads 4
      --timeout 120
      --bind 0.0.0.0:$PORT
      --log-level info

    healthCheckPath: /api/health/

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      # Comma-separated — no spaces.  Add Vercel URL after first deploy.
      # Example: https://medbot.vercel.app,https://medbot-git-main-user.vercel.app
      - key: ALLOWED_HOSTS
        value: "*"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://medbot-frontend-iota.vercel.app/"

      # NLTK data directory — writable on Render free tier
      - key: NLTK_DATA
        value: "/tmp/nltk_data"

      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: medbot-db
    databaseName: medbot
    user: medbot_user
    region: oregon
    plan: free
